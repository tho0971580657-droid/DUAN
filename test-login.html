<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login | Thợ Ơi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/shared-styles.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Test Login</h1>
        <div class="row">
            <div class="col-md-6">
                <h3>Login as Customer</h3>
                <form id="loginCustomerForm">
                    <div class="mb-3">
                        <label>Email/Phone</label>
                        <input type="text" class="form-control" value="customer1@example.com" id="customerEmail">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" class="form-control" value="123456" id="customerPassword">
                    </div>
                    <button type="submit" class="btn btn-primary">Login as Customer</button>
                </form>
            </div>
            <div class="col-md-6">
                <h3>Login as Worker</h3>
                <form id="loginWorkerForm">
                    <div class="mb-3">
                        <label>Email/Phone</label>
                        <input type="text" class="form-control" value="worker@example.com" id="workerEmail">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" class="form-control" value="123456" id="workerPassword">
                    </div>
                    <button type="submit" class="btn btn-success">Login as Worker</button>
                </form>
            </div>
        </div>
        <div class="mt-5">
            <h3>Current Status</h3>
            <div id="status"></div>
            <button class="btn btn-danger" onclick="authManager.logout()">Logout</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function updateStatus() {
            const statusDiv = document.getElementById('status');
            const user = authManager.currentUser;
            if (user) {
                statusDiv.innerHTML = `
                    <p>Logged in as: ${user.firstName} ${user.lastName}</p>
                    <p>Role: ${user.role}</p>
                    <p>Email: ${user.email}</p>
                `;
            } else {
                statusDiv.innerHTML = '<p>Not logged in</p>';
            }
        }

        document.getElementById('loginCustomerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('customerEmail').value;
            const password = document.getElementById('customerPassword').value;
            const result = authManager.login(email, password);
            if (result.success) {
                alert('Logged in as customer');
                updateStatus();
            } else {
                alert(result.message);
            }
        });

        document.getElementById('loginWorkerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('workerEmail').value;
            const password = document.getElementById('workerPassword').value;
            const result = authManager.login(email, password);
            if (result.success) {
                alert('Logged in as worker');
                updateStatus();
            } else {
                alert(result.message);
            }
        });

        // Add a worker user if not exists
        const users = JSON.parse(localStorage.getItem('thooi_users') || '[]');
        const workerExists = users.find(u => u.email === 'worker@example.com');
        if (!workerExists) {
            users.push({
                id: 2001,
                firstName: 'Thợ',
                lastName: 'A',
                fullName: 'Thợ A',
                email: 'worker@example.com',
                phone: '0912345678',
                password: '123456',
                role: 'worker',
                createdAt: '2024-01-01T08:00:00.000Z',
                skills: 'Dọn dẹp',
                experience: 2,
                assignedOrders: []
            });
            localStorage.setItem('thooi_users', JSON.stringify(users));
        }

        updateStatus();
    </script>
</body>
</html>
