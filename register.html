<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Thợ Ơi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/shared-styles.css" rel="stylesheet">
    <style>
        :root { --primary-color: #0d6efd; --dark-bg: #1a1d20; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding-top: 70px; }
        * { -webkit-tap-highlight-color: transparent !important; }

        /* --- NAVBAR --- */
        header { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        .navbar { padding: 5px 0 !important; }
      .navbar-brand img { 
    height: 110px !important; /* Tăng số này lên nếu muốn to hơn nữa */
    width: auto; 
    margin: -10px 0 !important; /* Mẹo để to ra mà không làm cao thanh menu */
}        
        .navbar-nav .nav-link {
            color: #666 !important; font-weight: 500; padding: 8px 15px !important;
            transition: 0.3s; position: relative;
        }
        .navbar-nav .nav-link:hover, .navbar-nav .nav-link.active { color: var(--primary-color) !important; font-weight: 700; }
        
        @media (min-width: 992px) {
            .navbar-nav .nav-link::after {
                content: ''; position: absolute; bottom: 0; left: 15px;
                width: 0; height: 2px; background-color: var(--primary-color); transition: 0.3s;
            }
            .navbar-nav .nav-link:hover::after, .navbar-nav .nav-link.active::after { width: calc(100% - 30px); }
        }

        /* --- MAIN CONTENT --- */
        main { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 70px); padding: 40px 20px; }
        .auth-container { max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .auth-card { border: 1px solid #e9ecef; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); background: white; overflow: hidden; }
        .auth-card-body { padding: 40px; }
        .auth-title { font-size: 1.8rem; font-weight: 800; color: #1a1d20; margin-bottom: 10px; }
        .auth-subtitle { color: #6c757d; font-size: 0.95rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 1.3rem; }
        .form-label { font-weight: 600; color: #2c3e50; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .form-control, .form-select { border: 1.5px solid #e9ecef; border-radius: 12px; padding: 0.85rem 1rem; font-size: 0.95rem; transition: all 0.3s ease; background: #f8f9fa; }
        .form-control:focus, .form-select:focus { border-color: var(--primary-color); background: white; box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .worker-fields { display: none; padding-top: 1.5rem; border-top: 1.5px solid #e9ecef; margin-top: 1.5rem; }
        .worker-fields.active { display: block; }
        .auth-button { background: var(--primary-color); border: none; padding: 0.95rem 2rem; font-weight: 700; border-radius: 12px; margin-top: 1.5rem; width: 100%; transition: 0.3s; }
        .auth-button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3); }
        .auth-alert { border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; border: none; }
        .auth-divider { text-align: center; margin: 25px 0; color: #6c757d; font-size: 0.9rem; position: relative; }
        .auth-divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: #e9ecef; }
        .auth-divider span { background: white; padding: 0 10px; position: relative; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 0.95rem; color: #6c757d; }
        .auth-footer a { color: var(--primary-color); font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        @media (max-width: 576px) {
            .auth-card-body { padding: 25px; }
            .auth-title { font-size: 1.5rem; }
            .form-row { grid-template-columns: 1fr; }
            .auth-container { max-height: none; }
        }
        /* Tùy chỉnh nút chọn file cho chuyên nghiệp */
input[type="file"]::file-selector-button {
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 5px 15px;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 15px;
    transition: 0.3s;
    font-size: 0.8rem;
    font-weight: 600;
}

input[type="file"]::file-selector-button:hover {
    background: var(--primary-hover);
}

/* Hiệu ứng khi đã chọn file (vờ như thật) */
.form-control[type="file"] {
    line-height: 1.5;
}
    </style>
</head>
<body>
<header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
        <div class="container d-flex align-items-center justify-content-between">
             <a href="index.html" class="navbar-brand m-0 d-flex flex-column align-items-center">
    <img src="images/logomoi.png" alt="Logo">
    <div style="font-size: 1.2rem; color: #fc6a0f; text-align: center; margin-top: -16px; font-style: italic;font-weight: bold;">
        Gọi là có, lo là xong
    </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAuth" aria-controls="navbarAuth" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarAuth">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="profileDropdownRegister" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle"></i> Hồ sơ
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdownRegister">
                            <li><a class="dropdown-item" href="login.html">Đăng nhập</a></li>
                            <li><a class="dropdown-item" href="register.html">Đăng ký</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<main>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-card-body">
                <h2 class="auth-title"><i class="fas fa-user-plus me-2" style="color: var(--primary-color);"></i>Đăng ký</h2>
                <p class="auth-subtitle">Tham gia Thợ Ơi hôm nay</p>
                <form id="registerForm" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName" class="form-label">Tên</label>
                            <input type="text" class="form-control" id="firstName" placeholder="" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName" class="form-label">Họ</label>
                            <input type="text" class="form-control" id="lastName" placeholder="" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="registerEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="registerEmail" placeholder="" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="registerPhone" class="form-label">SĐT</label>
                            <input type="tel" class="form-control" id="registerPhone" placeholder="" required>
                        </div>
                        <div class="form-group">
                            <label for="registerRole" class="form-label">Vai trò</label>
                            <select id="registerRole" class="form-select" required>
                                <option value="customer">Khách hàng</option>
                                <option value="worker">Thợ</option>
                            </select>
                        </div>
                    </div>
                    <div id="workerFields" class="worker-fields">
                        <div class="form-group">
                            <label for="workerSkills" class="form-label">Kỹ năng chuyên môn</label>
                            <input type="text" class="form-control" id="workerSkills" placeholder="VD: Dọn dẹp, Giặt ủi, Sửa chữa">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="workerExperience" class="form-label">Kinh nghiệm (năm)</label>
                                <input type="number" class="form-control" id="workerExperience" placeholder="" min="0">
                            </div>
                            <div class="form-group">
                                <label for="workerGender" class="form-label">Giới tính</label>
                                <select id="workerGender" class="form-select">
                                    <option value="male">Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="workerBirthDate" class="form-label">Ngày sinh</label>
                            <input type="date" class="form-control" id="workerBirthDate">
                        </div>
                        <div class="form-group">
                            <label for="workerAddress" class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" id="workerAddress" placeholder="Số nhà, đường, phường/xã...">
                        </div>

                      <div class="row mt-3">
    <div class="col-md-6 form-group">
        <label class="form-label"><i class="fas fa-id-card me-2"></i>CCCD mặt trước</label>
        <input type="file" class="form-control" id="workerIdCardFront" accept="image/*">
    </div>
    <div class="col-md-6 form-group">
        <label class="form-label"><i class="fas fa-id-card me-2"></i>CCCD mặt sau</label>
        <input type="file" class="form-control" id="workerIdCardBack" accept="image/*">
    </div>
</div>

<div class="row mt-3">
    <div class="col-md-6 form-group">
        <label class="form-label"><i class="fas fa-medal me-2"></i>Chứng chỉ / Bằng cấp</label>
        <input type="file" class="form-control" id="workerCertificates" accept="image/*">
    </div>
    <div class="col-md-6 form-group">
        <label class="form-label"><i class="fas fa-file-medical me-2"></i>Giấy khám sức khỏe</label>
        <input type="file" class="form-control" id="workerHealthCert" accept="image/*">
    </div>
</div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="registerPassword" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="registerPassword" placeholder="Tối thiểu 6 ký tự" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPasswordConfirm" class="form-label">Xác nhận</label>
                            <input type="password" class="form-control" id="registerPasswordConfirm" placeholder="Nhập lại" required>
                        </div>
                    </div>
                    <div id="registerFeedback" class="auth-alert text-danger" style="display: none;"></div>
                    <button type="submit" class="btn auth-button">Đăng ký</button>
                </form>
                <div class="auth-divider"><span>Hoặc</span></div>
                <div class="auth-footer">
                    Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const roleSelect = document.getElementById('registerRole');
        const workerFields = document.getElementById('workerFields');
        const registerForm = document.getElementById('registerForm');
        const feedback = document.getElementById('registerFeedback');
        const workerInputs = [
            document.getElementById('workerSkills'),
            document.getElementById('workerExperience'),
            document.getElementById('workerGender'),
            document.getElementById('workerBirthDate'),
            document.getElementById('workerAddress'),
            document.getElementById('workerCertificates')
        ];

        function updateWorkerFieldState() {
            const isWorker = roleSelect.value === 'worker';
            workerFields.classList.toggle('active', isWorker);

            workerInputs.forEach(input => {
                if (!input) return;
                input.disabled = !isWorker;
            });
        }

        roleSelect.addEventListener('change', updateWorkerFieldState);
        updateWorkerFieldState();

        registerForm.addEventListener('submit', function(event) {
            event.preventDefault();
            feedback.style.display = 'none';
            feedback.textContent = '';

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const role = roleSelect.value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerPasswordConfirm').value;

            if (!firstName || !lastName || !email || !phone || !password || !confirmPassword) {
                feedback.textContent = 'Vui lòng điền đầy đủ thông tin.';
                feedback.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                feedback.textContent = 'Mật khẩu và xác nhận mật khẩu không khớp.';
                feedback.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                feedback.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
                feedback.style.display = 'block';
                return;
            }

            const userData = {
                firstName,
                lastName,
                email,
                phone,
                password,
                role
            };

            if (role === 'worker') {
                const skills = document.getElementById('workerSkills').value.trim();
                const experience = parseInt(document.getElementById('workerExperience').value, 10) || 0;
                const gender = document.getElementById('workerGender').value;
                const birthDate = document.getElementById('workerBirthDate').value;
                const address = document.getElementById('workerAddress').value.trim();
                const certificates = document.getElementById('workerCertificates').value.trim();

                if (!skills) {
                    feedback.textContent = 'Vui lòng nhập kỹ năng chuyên môn.';
                    feedback.style.display = 'block';
                    return;
                }
                if (!address) {
                    feedback.textContent = 'Vui lòng nhập địa chỉ.';
                    feedback.style.display = 'block';
                    return;
                }

                userData.skills = skills;
                userData.experience = experience;
                userData.gender = gender;
                userData.birthDate = birthDate;
                userData.address = address;
                userData.certificates = certificates;
            }

            if (!window.authManager || typeof window.authManager.register !== 'function') {
                feedback.textContent = 'Lỗi hệ thống: không thể khởi tạo authManager.';
                feedback.style.display = 'block';
                return;
            }

            const result = window.authManager.register(userData);
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                feedback.textContent = result.message;
                feedback.style.display = 'block';
            }
        });
    });
</script>
</body>
</html>
